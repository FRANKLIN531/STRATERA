<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 700" fill="none">
  <rect width="1600" height="700" fill="#f6f8fa"/>
  <defs>
    <linearGradient id="wash" x1="800" y1="0" x2="800" y2="700" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="0.5" stop-color="#f1f5f9" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#e8f0ec" stop-opacity="0.35"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#10B981" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#34D399" stop-opacity="0.06"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="700" fill="url(#wash)"/>
  <circle cx="300" cy="500" r="240" fill="url(#green)"/>
  <circle cx="1200" cy="200" r="200" fill="url(#green)"/>
  <rect x="0" y="500" width="1600" height="200" fill="#eef2f4"/>
  <!-- Plant + soft shapes -->
  <circle cx="180" cy="420" r="48" fill="#10B981" opacity="0.1"/>
  <rect x="140" y="460" width="24" height="60" rx="4" fill="#c9a227" opacity="0.25"/>
  <ellipse cx="152" cy="420" rx="40" ry="28" fill="#10B981" opacity="0.15"/>
</svg>
