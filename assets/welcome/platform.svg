<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="600" gradientUnits="userSpaceOnUse">
      <stop stop-color="#001428"/>
      <stop offset="1" stop-color="#1e3a8a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#60A5FA"/>
      <stop offset="1" stop-color="#818CF8"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <circle cx="700" cy="500" r="200" fill="#3B82F6" opacity="0.1"/>
  <circle cx="80" cy="100" r="100" fill="#6366F1" opacity="0.08"/>
  <!-- Central hub -->
  <circle cx="400" cy="300" r="72" fill="url(#accent)" opacity="0.25" stroke="#93C5FD" stroke-width="2"/>
  <circle cx="400" cy="300" r="36" fill="url(#accent)"/>
  <!-- Satellite nodes -->
  <circle cx="200" cy="200" r="40" fill="rgba(255,255,255,0.1)" stroke="#60A5FA" stroke-width="2"/>
  <circle cx="600" cy="180" r="36" fill="url(#accent)" opacity="0.6"/>
  <circle cx="620" cy="400" r="44" fill="rgba(255,255,255,0.08)" stroke="#818CF8" stroke-width="2"/>
  <circle cx="180" cy="420" r="38" fill="url(#accent)" opacity="0.45"/>
  <circle cx="400" cy="120" r="32" fill="rgba(255,255,255,0.12)" stroke="#93C5FD" stroke-width="2"/>
  <!-- Connections -->
  <line x1="400" y1="300" x2="200" y2="200" stroke="#60A5FA" stroke-width="2" opacity="0.35"/>
  <line x1="400" y1="300" x2="600" y2="180" stroke="#60A5FA" stroke-width="2" opacity="0.35"/>
  <line x1="400" y1="300" x2="620" y2="400" stroke="#818CF8" stroke-width="2" opacity="0.35"/>
  <line x1="400" y1="300" x2="180" y2="420" stroke="#60A5FA" stroke-width="2" opacity="0.35"/>
  <line x1="400" y1="300" x2="400" y2="120" stroke="#93C5FD" stroke-width="2" opacity="0.35"/>
  <!-- Desktop cards -->
  <rect x="100" y="480" width="120" height="72" rx="10" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
  <rect x="340" y="480" width="120" height="72" rx="10" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
  <rect x="580" y="480" width="120" height="72" rx="10" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
</svg>
