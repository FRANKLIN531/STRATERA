  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <circle cx="640" cy="100" r="160" fill="#10B981" opacity="0.1"/>
  <circle cx="100" cy="500" r="120" fill="#059669" opacity="0.08"/>
