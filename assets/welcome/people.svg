  <path d="M400 240 L460 420" stroke="#6EE7B7" stroke-width="2" opacity="0.25"/>
  <!-- Calendar card -->
  <rect x="540" y="380" width="200" height="160" rx="16" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)" stroke-width="2"/>
  <rect x="540" y="380" width="200" height="44" rx="16" fill="url(#accent)" opacity="0.25"/>
  <rect x="568" y="448" width="32" height="32" rx="6" fill="rgba(255,255,255,0.1)"/>
  <rect x="608" y="448" width="32" height="32" rx="6" fill="rgba(255,255,255,0.1)"/>
  <rect x="652" y="448" width="32" height="32" rx="6" fill="url(#accent)" opacity="0.8"/>
  <rect x="568" y="492" width="32" height="32" rx="6" fill="rgba(255,255,255,0.08)"/>
  <rect x="608" y="492" width="32" height="32" rx="6" fill="rgba(255,255,255,0.08)"/>
