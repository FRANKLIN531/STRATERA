<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 700" fill="none">
  <rect width="1600" height="700" fill="#f4f7fb"/>
  <rect width="1600" height="700" fill="url(#wash)"/>
  <defs>
    <linearGradient id="wash" x1="800" y1="0" x2="800" y2="700" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="0.45" stop-color="#f8fafc" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#e8eef5" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#3B82F6" stop-opacity="0.15"/>
      <stop offset="1" stop-color="#60A5FA" stop-opacity="0.08"/>
    </linearGradient>
  </defs>
  <circle cx="200" cy="180" r="220" fill="url(#blue)"/>
  <circle cx="1350" cy="520" r="280" fill="url(#blue)"/>
  <!-- Soft desk / window light -->
  <rect x="0" y="480" width="1600" height="220" fill="#eef2f6"/>
  <rect x="980" y="320" width="320" height="200" rx="12" fill="#fff" opacity="0.85"/>
  <rect x="1000" y="340" width="200" height="8" rx="4" fill="#cbd5e1"/>
  <rect x="1000" y="360" width="160" height="6" rx="3" fill="#e2e8f0"/>
  <rect x="1180" y="400" width="80" height="60" rx="6" fill="#3B82F6" opacity="0.12"/>
</svg>
